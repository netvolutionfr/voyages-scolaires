# Test application properties — override env-var-dependent settings
spring.profiles.active=test
spring.application.name=voyages-test

# Disable datasource auto-configuration for slice tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Stub out required JWT / security properties
app.jwt.issuer=https://test.local
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=2592000
app.jwt.pending-ttl-seconds=600
app.jwt.private-key=PLACEHOLDER
app.jwt.public-key=PLACEHOLDER

# Stub out required datasource properties (not used in slice tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Stub other required env vars
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test.local
logging.level.org.springframework.security=WARN

# Stub crypto key (base64 of a 32-byte key for AES-256)
app.crypto.kek.b64=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
app.data-encryption.key=test-key

# Stub mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.sender=noreply@test.local
spring.mail.username=
spring.mail.password=

# Stub WebAuthn
webauthn.allowed-origins=http://localhost:5173
webauthn.default-origin=http://localhost:5173
webauthn.rp.id=localhost
webauthn.rp.name=TestApp
webauthn.challenge.ttl-seconds=300

# Stub S3
app.s3.bucket=test
app.s3.endpoint=http://localhost:9000
app.s3.region=us-east-1
app.s3.access-key=minioadmin
app.s3.secret-key=minioadmin
app.s3.presign-duration-min=10

# Disable Flyway
spring.flyway.enabled=false

# Stub front url
app.front.url=http://localhost:5173

# Cookie settings
app.cookie.secure=false
app.cookie.same-site=Lax
app.cookie.domain=
